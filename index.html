<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Página</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
color:white;
}

/* botão iniciar */

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
font-size:22px;
background:#00ff00;
border:none;
border-radius:10px;
cursor:pointer;
}

/* imagens */

#crashContainer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

.crashImage{
position:absolute;
width:40px;
height:40px;
transition:all 2s;
}

/* voltar */

#voltar{
position:fixed;
bottom:20px;
right:20px;
background:red;
color:white;
padding:15px;
border:none;
border-radius:10px;
display:none;
font-size:18px;
}

</style>
</head>

<body>

<button id="start">ENTRAR</button>

<div id="crashContainer"></div>

<button id="voltar">Voltar</button>

<audio id="alerta" src="alerta_ameaca.mp3"></audio>

<script>

const start = document.getElementById("start")
const container = document.getElementById("crashContainer")
const alerta = document.getElementById("alerta")
const voltar = document.getElementById("voltar")

function iniciar(){

start.style.display="none"

alerta.volume=1
alerta.play()

let total = 60

for(let i=0;i<total;i++){

setTimeout(()=>{

let img = document.createElement("img")

img.src="bsod.png"
img.className="crashImage"

let size = 20 + Math.random()*40

img.style.width=size+"px"
img.style.height=size+"px"

img.style.top=Math.random()*window.innerHeight+"px"
img.style.left=Math.random()*window.innerWidth+"px"

container.appendChild(img)

/* som erro */

let som = new Audio("error.mp3")
som.volume=1
som.play()

/* crescer */

setTimeout(()=>{

let big = 200 + Math.random()*200

img.style.width=big+"px"
img.style.height=big+"px"

},50)

}, i*120)

}

/* voz do site depois do audio */

alerta.onended = ()=>{

let msg = new SpeechSynthesisUtterance(
"Isso é apenas uma brincadeira"
)

msg.lang="pt-BR"

speechSynthesis.speak(msg)

}

/* liberar botão */

setTimeout(()=>{
voltar.style.display="block"
},50000)

}

start.onclick=iniciar

voltar.onclick=()=>{
container.innerHTML=""
}

</script>

</body>
</html>
